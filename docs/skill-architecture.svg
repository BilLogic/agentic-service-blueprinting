<svg viewBox="0 -36 880 526" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    .col { font-size: 10px; font-weight: 700; letter-spacing: .09em; fill: #8a8f98; }
    .title { font-size: 11px; font-weight: 700; fill: #273036; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .chip { font-size: 9.5px; fill: #273036; }
    .dim { fill: #9ca3af; }
    .anno { font-size: 8px; font-weight: 700; letter-spacing: .06em; fill: #8a8f98; }
    .sub { font-size: 9px; fill: #9ca3af; }
    .edge { stroke: #b6bac2; stroke-width: 1.2; fill: none; marker-end: url(#tri); }
    .edgeLabel { font-size: 9.5px; font-weight: 600; fill: #6b7280; }
  </style>
  <defs>
    <marker id="tri" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#b6bac2"/>
    </marker>
  </defs>

  <text x="16" y="-12" font-size="15" font-weight="700" fill="#273036">How the skill works</text>

  <!-- Column headers -->
  <text x="40" y="28" class="col">SKILL</text>
  <text x="330" y="28" class="col">AGENTS</text>
  <text x="640" y="28" class="col">REFERENCES</text>

  <!-- Edges: skill spawns agents -->
  <path class="edge" d="M200,196 C260,170 280,110 326,84"/>
  <path class="edge" d="M200,210 C250,210 276,210 326,210"/>
  <path class="edge" d="M200,224 C260,250 280,310 326,336"/>
  <rect x="235" y="201" width="50" height="18" rx="9" fill="#ffffff" stroke="#e2e4e9"/>
  <text x="260" y="214" text-anchor="middle" class="edgeLabel">spawns</text>

  <!-- Edges: each agent points at the docs it consults -->
  <path class="edge" d="M520,74 C570,82 610,102 650,115"/>
  <path class="edge" d="M520,198 C570,182 610,158 650,145"/>
  <path class="edge" d="M520,210 C570,202 610,194 650,190"/>
  <path class="edge" d="M520,222 C570,220 610,217 650,216"/>
  <rect x="556" y="156" width="58" height="18" rx="9" fill="#ffffff" stroke="#e2e4e9"/>
  <text x="585" y="169" text-anchor="middle" class="edgeLabel">consults</text>

  <!-- Edge: skill runs scripts -->
  <path class="edge" d="M115,238 C115,436 380,442 634,442"/>
  <rect x="352" y="420" width="42" height="18" rx="9" fill="#ffffff" stroke="#e2e4e9"/>
  <text x="373" y="433" text-anchor="middle" class="edgeLabel">runs</text>

  <!-- ===== Col 1: skill ===== -->
  <rect x="40" y="184" width="160" height="54" rx="14" fill="#d9e4ea" stroke="#9aadbe" stroke-width="1.5"/>
  <text x="60" y="208" class="title mono" font-size="12">SKILL.md</text>
  <text x="60" y="224" class="sub" fill="#6b7280">always loaded</text>

  <!-- ===== Col 2: agents ===== -->
  <g>
    <rect x="342" y="34" width="190" height="56" rx="14" fill="#f4f5f7" stroke="#c9ccd4"/>
    <rect x="336" y="40" width="190" height="56" rx="14" fill="#fafbfc" stroke="#c9ccd4"/>
    <rect x="330" y="46" width="190" height="56" rx="14" fill="#ffffff" stroke="#9aadbe" stroke-width="1.4"/>
    <text x="346" y="70" class="title mono">document-reader</text>
    <text x="504" y="69" text-anchor="end" class="anno">×N</text>
    <text x="346" y="87" class="sub">reads the source documents</text>

    <rect x="330" y="182" width="190" height="56" rx="14" fill="#ffffff" stroke="#9aadbe" stroke-width="1.4"/>
    <text x="346" y="206" class="title mono">blueprint-reviewer</text>
    <text x="346" y="223" class="sub">reviews the draft blueprint</text>

    <rect x="330" y="308" width="190" height="56" rx="14" fill="#ffffff" stroke="#9aadbe" stroke-width="1.4"/>
    <text x="346" y="332" class="title mono">render-checker</text>
    <text x="346" y="349" class="sub">walks the deployed app</text>
  </g>

  <!-- ===== Col 3: references ===== -->
  <rect x="640" y="40" width="224" height="366" rx="12" fill="#fafbfc" stroke="#c9ccd4" stroke-width="1.3"/>
  <text x="656" y="64" class="title mono">references/</text>
  <text x="848" y="63" text-anchor="end" class="anno">14 DOCS</text>
  <text x="656" y="80" class="sub">loaded progressively, one doc at a time</text>

  <text x="656" y="102" class="anno">SCHEMAS</text>
  <rect x="656" y="108" width="192" height="22" rx="5" fill="#ffffff" stroke="#c9ccd4"/>
  <text x="666" y="123" class="chip mono">crosswalk-schema.json</text>
  <rect x="656" y="134" width="192" height="22" rx="5" fill="#ffffff" stroke="#c9ccd4"/>
  <text x="666" y="149" class="chip mono">ir-schema.json</text>

  <text x="656" y="176" class="anno">CONVENTIONS</text>
  <rect x="656" y="182" width="192" height="22" rx="5" fill="#ffffff" stroke="#c9ccd4"/>
  <text x="666" y="197" class="chip mono">layer-roles</text>
  <rect x="656" y="208" width="192" height="22" rx="5" fill="#ffffff" stroke="#c9ccd4"/>
  <text x="666" y="223" class="chip mono">lane-vocabulary</text>
  <rect x="656" y="234" width="192" height="22" rx="5" fill="#eceef2" stroke="#e2e4e9"/>
  <text x="666" y="249" class="chip dim">+ 6 more guides &amp; specs</text>

  <text x="656" y="280" class="anno">PLAYBOOKS — ONE PER PHASE</text>
  <rect x="656" y="286" width="192" height="22" rx="5" fill="#eceef2" stroke="#d4d4da"/>
  <text x="666" y="301" class="chip mono dim">ingest-playbook</text>
  <rect x="656" y="312" width="192" height="22" rx="5" fill="#eceef2" stroke="#d4d4da"/>
  <text x="666" y="327" class="chip mono dim">cocreate-playbook</text>
  <rect x="656" y="338" width="192" height="22" rx="5" fill="#eceef2" stroke="#d4d4da"/>
  <text x="666" y="353" class="chip mono dim">translate-playbook</text>
  <rect x="656" y="364" width="192" height="22" rx="5" fill="#d9e4ea" stroke="#9aadbe" stroke-width="1.2"/>
  <text x="666" y="379" class="chip mono" font-weight="700">review-import-playbook</text>

  <!-- ===== Scripts, below references ===== -->
  <rect x="640" y="418" width="224" height="52" rx="12" fill="#fafbfc" stroke="#c9ccd4" stroke-width="1.3"/>
  <text x="656" y="441" class="title mono">scripts/</text>
  <text x="656" y="457" class="sub">deterministic checks between phases</text>
</svg>
