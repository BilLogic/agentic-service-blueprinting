<svg viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    .h2 { font-size: 13px; font-weight: 700; fill: #273036; }
    .h3 { font-size: 11px; font-weight: 600; fill: #273036; }
    .chip { font-size: 10px; fill: #273036; }
    .tag { font-size: 9.5px; fill: #6b7280; }
    .flow { stroke: #8e8e93; stroke-width: 1.8; fill: none; marker-end: url(#arr); }
    .flowLabel { font-size: 10px; font-weight: 600; fill: #4b5563; }
  </style>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7" fill="none" stroke="#8e8e93" stroke-width="1.6"/>
    </marker>
  </defs>

  <!-- ============ Left: references shelf ============ -->
  <rect x="16" y="64" width="180" height="290" rx="10" fill="#f4f4f7" stroke="#d4d4da"/>
  <text x="30" y="86" class="h2">references/</text>
  <text x="182" y="86" text-anchor="end" class="tag">13 docs</text>

  <g>
    <rect x="30" y="98" width="152" height="20" rx="5" fill="#eceef2" stroke="#d4d4da"/>
    <text x="38" y="112" class="chip" fill="#9ca3af">ingest-playbook</text>
    <rect x="30" y="123" width="152" height="20" rx="5" fill="#eceef2" stroke="#d4d4da"/>
    <text x="38" y="137" class="chip" fill="#9ca3af">cocreate-playbook</text>
    <rect x="30" y="148" width="152" height="20" rx="5" fill="#eceef2" stroke="#d4d4da"/>
    <text x="38" y="162" class="chip" fill="#9ca3af">translate-playbook</text>
    <!-- the one currently loaded -->
    <rect x="30" y="173" width="152" height="20" rx="5" fill="#d9e4ea" stroke="#9aadbe" stroke-width="1.3"/>
    <text x="38" y="187" class="chip" font-weight="700">review-import-playbook</text>
    <rect x="30" y="198" width="152" height="20" rx="5" fill="#eceef2" stroke="#d4d4da"/>
    <text x="38" y="212" class="chip" fill="#9ca3af">lane-vocabulary</text>
    <rect x="30" y="223" width="152" height="20" rx="5" fill="#eceef2" stroke="#d4d4da"/>
    <text x="38" y="237" class="chip" fill="#9ca3af">layer-roles</text>
    <rect x="30" y="248" width="152" height="20" rx="5" fill="#eceef2" stroke="#d4d4da"/>
    <text x="38" y="262" class="chip" fill="#9ca3af">adapter-contract</text>
    <rect x="30" y="273" width="152" height="20" rx="5" fill="#eceef2" stroke="#d4d4da"/>
    <text x="38" y="287" class="chip" fill="#9ca3af">workspace-state</text>
    <text x="38" y="310" class="tag">…ir-schema · crosswalk ·</text>
    <text x="38" y="324" class="tag">deploy-notes · customization</text>
  </g>

  <!-- load arrow shelf -> main -->
  <path class="flow" d="M196,183 L246,183"/>
  <text x="221" y="172" text-anchor="middle" class="flowLabel">load</text>
  <text x="221" y="200" text-anchor="middle" class="tag">one at a time,</text>
  <text x="221" y="212" text-anchor="middle" class="tag">per phase</text>

  <!-- ============ Center: main agent context ============ -->
  <rect x="250" y="36" width="356" height="318" rx="12" fill="#ffffff" stroke="#9aadbe" stroke-width="1.5"/>
  <text x="268" y="60" class="h2">Main agent — one context window</text>

  <!-- SKILL.md chip -->
  <rect x="268" y="74" width="320" height="58" rx="8" fill="#e0f0e8" stroke="#c3ddd0"/>
  <text x="282" y="94" class="h3">SKILL.md — the single skill, always loaded</text>
  <text x="282" y="110" class="tag">routes by entry state: nothing → co-create · docs → ingest</text>
  <text x="282" y="123" class="tag">foreign diagram → translate · existing workspace → resume</text>

  <!-- current playbook chip -->
  <rect x="268" y="144" width="320" height="40" rx="8" fill="#d9e4ea" stroke="#9aadbe" stroke-width="1.3"/>
  <text x="282" y="161" class="h3">review-import-playbook.md — current phase only</text>
  <text x="282" y="176" class="tag">swapped out when the phase changes — context stays small</text>

  <!-- workspace state chip -->
  <rect x="268" y="196" width="320" height="40" rx="8" fill="#f8e8d4" stroke="#e5d0b2"/>
  <text x="282" y="213" class="h3">blueprint-workspace.json — durable state</text>
  <text x="282" y="228" class="tag">per-scenario status + sign-off hashes · resume point</text>

  <!-- IR chip -->
  <rect x="268" y="248" width="320" height="40" rx="8" fill="#f8dde8" stroke="#e7c2d2"/>
  <text x="282" y="265" class="h3">blueprint.json — the IR</text>
  <text x="282" y="280" class="tag">single source of truth; every artifact generates from it</text>

  <text x="268" y="320" class="tag">The main agent orchestrates and edits; heavy reading, adversarial</text>
  <text x="268" y="334" class="tag">review, and render checks run in subagents with their own context.</text>

  <!-- ============ Right: subagents ============ -->
  <!-- document-reader stack -->
  <rect x="672" y="52" width="180" height="64" rx="9" fill="#f4f4f7" stroke="#d4d4da"/>
  <rect x="664" y="44" width="180" height="64" rx="9" fill="#fafafa" stroke="#d4d4da"/>
  <rect x="656" y="36" width="180" height="64" rx="9" fill="#ffffff" stroke="#b6c7d2" stroke-width="1.2"/>
  <text x="670" y="56" class="h3">document-reader × N</text>
  <text x="670" y="71" class="tag">parallel fan-out over sources;</text>
  <text x="670" y="84" class="tag">returns structure + provenance</text>

  <rect x="656" y="132" width="180" height="64" rx="9" fill="#ffffff" stroke="#b6c7d2" stroke-width="1.2"/>
  <text x="670" y="152" class="h3">blueprint-reviewer</text>
  <text x="670" y="167" class="tag">adversarial pre-sign-off review;</text>
  <text x="670" y="180" class="tag">never saw the drafting</text>

  <rect x="656" y="228" width="180" height="64" rx="9" fill="#ffffff" stroke="#b6c7d2" stroke-width="1.2"/>
  <text x="670" y="248" class="h3">render-checker</text>
  <text x="670" y="263" class="tag">walks every scenario × view</text>
  <text x="670" y="276" class="tag">in the running app</text>

  <text x="746" y="312" text-anchor="middle" class="tag">each gets a FRESH context —</text>
  <text x="746" y="325" text-anchor="middle" class="tag">no anchoring on the main thread</text>

  <!-- dispatch arrows -->
  <path class="flow" d="M606,90 L650,74"/>
  <path class="flow" d="M606,164 L650,164"/>
  <path class="flow" d="M606,240 L650,258"/>
  <text x="628" y="130" text-anchor="middle" class="flowLabel">spawn</text>

  <!-- ============ Bottom: deterministic gates ============ -->
  <rect x="250" y="386" width="602" height="98" rx="10" fill="#eceef2" stroke="#c9ccd4"/>
  <text x="268" y="408" class="h2">Deterministic gates — scripts + hooks, not model judgment</text>
  <g>
    <rect x="268" y="420" width="128" height="22" rx="6" fill="#ffffff" stroke="#d4d4da"/>
    <text x="278" y="435" class="chip">validate_ir.py</text>
    <rect x="404" y="420" width="168" height="22" rx="6" fill="#ffffff" stroke="#d4d4da"/>
    <text x="414" y="435" class="chip">compute_signoff_hash.py</text>
    <rect x="580" y="420" width="252" height="22" rx="6" fill="#ffffff" stroke="#d4d4da"/>
    <text x="590" y="435" class="chip">generate_fallbacks.py · generate_seed_sql.py</text>
    <rect x="268" y="450" width="196" height="22" rx="6" fill="#ffffff" stroke="#d4d4da"/>
    <text x="278" y="465" class="chip">hook: auto-validate IR on edit</text>
    <rect x="472" y="450" width="180" height="22" rx="6" fill="#ffffff" stroke="#d4d4da"/>
    <text x="482" y="465" class="chip">hook: service-role secret guard</text>
  </g>

  <!-- gate arrow main -> gates -->
  <path class="flow" d="M428,354 L428,382"/>
  <text x="440" y="372" class="flowLabel">every edit / phase exit</text>
</svg>
