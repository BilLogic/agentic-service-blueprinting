<svg viewBox="0 0 940 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    .label { font-size: 13px; font-weight: 600; fill: #273036; }
    .caption { font-size: 11px; fill: #6b7280; }
    .tiny { font-size: 10px; fill: #6b7280; }
    .cellText { font-size: 9px; fill: #273036; }
    .flow { stroke: #8e8e93; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .trigger { stroke: #3a3a3c; stroke-width: 2.5; fill: none; marker-end: url(#arrowDark); }
    @media (prefers-color-scheme: dark) {
      .label { fill: #e5e7eb; }
      .caption { fill: #9ca3af; }
      .tiny { fill: #9ca3af; }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#8e8e93" stroke-width="1.8"/>
    </marker>
    <marker id="arrowDark" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#3a3a3c" stroke-width="2"/>
    </marker>
  </defs>

  <!-- 1. Lifecycle -->
  <rect x="20" y="60" width="150" height="44" rx="10" fill="#e8e8ed" stroke="#d4d4da"/>
  <text x="95" y="79" text-anchor="middle" class="label">Service lifecycle</text>
  <text x="95" y="94" text-anchor="middle" class="tiny">the end-to-end journey</text>
  <text x="95" y="125" text-anchor="middle" class="caption">one per service</text>

  <!-- flow lifecycle -> phases -->
  <path class="flow" d="M170,82 L205,82"/>

  <!-- 2. Phases -->
  <g>
    <rect x="212" y="38" width="96" height="30" rx="8" fill="#d9e4ea" stroke="#b6c7d2"/>
    <text x="260" y="57" text-anchor="middle" class="label">Phase ①</text>
    <rect x="212" y="74" width="96" height="30" rx="8" fill="#c5d6e0" stroke="#9aadbe"/>
    <text x="260" y="93" text-anchor="middle" class="label">Phase ②</text>
    <rect x="212" y="110" width="96" height="30" rx="8" fill="#d9e4ea" stroke="#b6c7d2"/>
    <text x="260" y="129" text-anchor="middle" class="label">Phase ③</text>
    <!-- loop-back -->
    <path class="flow" d="M310,125 C340,125 340,53 310,53"/>
    <text x="348" y="48" class="tiny">can loop back</text>
    <text x="260" y="162" text-anchor="middle" class="caption">ordered stages</text>
  </g>

  <!-- flow phase -> scenario -->
  <path class="flow" d="M308,89 L415,89" stroke-dasharray="0"/>

  <!-- 3. Scenario -->
  <rect x="422" y="60" width="140" height="58" rx="10" fill="#ffffff" stroke="#b6c7d2" stroke-width="1.5"/>
  <rect x="422" y="60" width="140" height="20" rx="10" fill="#d9e4ea" stroke="#b6c7d2"/>
  <text x="492" y="74" text-anchor="middle" class="label" font-size="11">Scenario</text>
  <text x="492" y="96" text-anchor="middle" class="tiny">one concrete journey</text>
  <text x="492" y="110" text-anchor="middle" class="tiny">single · side-by-side · integrated</text>
  <text x="492" y="140" text-anchor="middle" class="caption">a phase can hold several</text>

  <!-- flow scenario -> grid -->
  <path class="flow" d="M562,89 L610,89"/>

  <!-- 4. Path grid stack -->
  <!-- back sheets = other paths -->
  <rect x="632" y="42" width="304" height="196" rx="8" fill="#f4f4f7" stroke="#d4d4da"/>
  <rect x="624" y="50" width="304" height="196" rx="8" fill="#fafafa" stroke="#d4d4da"/>
  <!-- front sheet = the happy path -->
  <rect x="616" y="58" width="304" height="196" rx="8" fill="#ffffff" stroke="#b6c7d2" stroke-width="1.5"/>
  <text x="628" y="76" class="label" font-size="12">Path · happy</text>
  <text x="912" y="76" text-anchor="end" class="tiny">others: exception / alternative…</text>

  <!-- steps header -->
  <text x="690" y="94" class="tiny">Step 1</text>
  <text x="752" y="94" class="tiny">Step 2</text>
  <text x="814" y="94" class="tiny">Step 3</text>
  <text x="876" y="94" class="tiny">Step 4</text>

  <!-- lanes: label + row of cells -->
  <!-- customer lane -->
  <text x="628" y="115" class="tiny">customer</text>
  <g>
    <rect x="682" y="102" width="44" height="26" rx="5" fill="#e0f0e8" stroke="#c3ddd0"/>
    <rect x="744" y="102" width="44" height="26" rx="5" fill="#e0f0e8" stroke="#c3ddd0"/>
    <rect x="806" y="102" width="44" height="26" rx="5" fill="#e0f0e8" stroke="#c3ddd0"/>
    <rect x="868" y="102" width="44" height="26" rx="5" fill="#e0f0e8" stroke="#c3ddd0"/>
  </g>
  <!-- interaction line -->
  <line x1="628" y1="136" x2="912" y2="136" stroke="#8e8e93" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- frontstage lane -->
  <text x="628" y="153" class="tiny">frontstage</text>
  <g>
    <rect x="682" y="140" width="44" height="26" rx="5" fill="#f8dde8" stroke="#e7c2d2"/>
    <rect x="806" y="140" width="44" height="26" rx="5" fill="#f8dde8" stroke="#e7c2d2"/>
  </g>
  <!-- visibility line -->
  <line x1="628" y1="174" x2="912" y2="174" stroke="#8e8e93" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- backstage lane -->
  <text x="628" y="191" class="tiny">backstage</text>
  <g>
    <rect x="744" y="178" width="44" height="26" rx="5" fill="#f5dfd0" stroke="#e3c6ae"/>
    <rect x="868" y="178" width="44" height="26" rx="5" fill="#f5dfd0" stroke="#e3c6ae"/>
  </g>
  <!-- support lane -->
  <text x="628" y="229" class="tiny">support</text>
  <g>
    <rect x="806" y="216" width="44" height="26" rx="5" fill="#f8e8d4" stroke="#e5d0b2"/>
  </g>

  <!-- trigger arrow between two cells -->
  <path class="trigger" d="M826,166 L790,177"/>
  <text x="832" y="177" class="tiny" font-weight="600">trigger</text>

  <!-- annotations under the grid -->
  <text x="20" y="278" class="caption">rows = lanes, colored by semantic role — labels free-form, any language</text>
  <text x="20" y="295" class="caption">columns = steps, shared across the scenario's paths · cell = lane × step</text>
  <text x="20" y="312" class="caption">triggers = "this kicks off that" dependency arrows</text>

  <!-- bottom mapping strip -->
  <text x="20" y="350" class="caption" font-weight="700">Tables behind the picture:</text>
  <text x="20" y="370" class="caption">service_lifecycles → phases → service_scenarios → paths · layers (rows) × steps (columns, via path_steps) → cells → cell_triggers</text>
  <text x="20" y="388" class="tiny">Full attribute-level ERD: docs/erd.mmd · column reference: supabase/DATABASE.md</text>
</svg>
