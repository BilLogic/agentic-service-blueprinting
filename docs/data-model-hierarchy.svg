<svg viewBox="0 -44 880 634" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    .head { font-size: 10px; font-weight: 700; letter-spacing: .09em; fill: #8a8f98; }
    .title { font-size: 11px; font-weight: 700; fill: #273036; }
    .titleDim { font-size: 10px; font-weight: 600; fill: #9ca3af; }
    .chip { font-size: 11px; font-weight: 600; fill: #273036; }
    .sub { font-size: 9.5px; fill: #9ca3af; }
    .pill { font-size: 7.5px; font-weight: 700; fill: #4f4b47; }
    .seq { stroke: #b6bac2; stroke-width: 1.2; fill: none; marker-end: url(#triL); }
    .loop { stroke: #b6bac2; stroke-width: 1.2; fill: none; stroke-dasharray: 4 3; marker-end: url(#triL); }
    .zoom { stroke: #d4d4da; stroke-width: 1.2; fill: none; }
    .boundary { stroke: #8a8f98; stroke-width: 1; stroke-dasharray: 4 3; }
  </style>
  <defs>
    <marker id="triL" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#b6bac2"/>
    </marker>
  </defs>

  <text x="16" y="-18" font-size="15" font-weight="700" fill="#273036">How a blueprint is organized</text>

  <!-- ===== Panel A: lifecycle holds phases ===== -->
  <rect x="16" y="8" width="132" height="22" rx="6" fill="#eef0f4" stroke="#b6bac2" stroke-width="1.2"/>
  <text x="26" y="23" class="title">Service lifecycle</text>
  <rect x="16" y="40" width="176" height="200" rx="10" fill="#fafbfc" stroke="#c9ccd4" stroke-width="1.3"/>
  <rect x="32" y="64" width="144" height="26" rx="7" fill="#d9e4ea" stroke="#9aadbe" stroke-width="1.3"/>
  <text x="44" y="81" class="chip">Phase 1</text>
  <path class="seq" d="M104,92 L104,107"/>
  <rect x="32" y="110" width="144" height="26" rx="7" fill="#e9eff4" stroke="#b6c7d2"/>
  <text x="44" y="127" class="chip" fill="#4b5563">Phase 2</text>
  <path class="seq" d="M104,138 L104,153"/>
  <rect x="32" y="156" width="144" height="26" rx="7" fill="#e9eff4" stroke="#b6c7d2"/>
  <text x="44" y="173" class="chip" fill="#4b5563">Phase 3</text>
  <path class="loop" d="M32,169 L24,169 L24,77 L29,77"/>
  <text x="104" y="258" text-anchor="middle" class="head">LIFECYCLE</text>
  <text x="104" y="276" text-anchor="middle" class="sub">maps to multiple phases,</text>
  <text x="104" y="289" text-anchor="middle" class="sub">in chronological order (can loop)</text>

  <!-- Zoom: Phase 1 chip projects into the Phase panel -->
  <path class="zoom" d="M176,64 L244,128"/>
  <path class="zoom" d="M176,90 L244,328"/>

  <!-- ===== Panel B: phase holds scenarios ===== -->
  <rect x="244" y="128" width="80" height="22" rx="6" fill="#d9e4ea" stroke="#9aadbe" stroke-width="1.2"/>
  <text x="254" y="143" class="title">Phase 1</text>
  <rect x="244" y="160" width="176" height="168" rx="10" fill="#fafbfc" stroke="#c9ccd4" stroke-width="1.3"/>
  <rect x="286" y="174" width="120" height="96" rx="8" fill="#eef0f4" stroke="#ccd2da"/>
  <text x="298" y="190" class="titleDim">Scenario C</text>
  <rect x="272" y="192" width="120" height="96" rx="8" fill="#f4f5f7" stroke="#ccd2da"/>
  <text x="284" y="208" class="titleDim">Scenario B</text>
  <rect x="258" y="210" width="120" height="96" rx="8" fill="#e8f3ed" stroke="#9dbfa9" stroke-width="1.4"/>
  <text x="270" y="228" class="title">Scenario A</text>
  <text x="332" y="346" text-anchor="middle" class="head">PHASE</text>
  <text x="332" y="364" text-anchor="middle" class="sub">holds multiple scenarios,</text>
  <text x="332" y="377" text-anchor="middle" class="sub">in no particular order</text>

  <!-- Zoom: Scenario A card projects into the Scenario panel -->
  <path class="zoom" d="M378,210 L472,218"/>
  <path class="zoom" d="M378,306 L472,418"/>

  <!-- ===== Panel C: scenario holds paths ===== -->
  <rect x="472" y="218" width="96" height="22" rx="6" fill="#e8f3ed" stroke="#9dbfa9" stroke-width="1.2"/>
  <text x="482" y="233" class="title">Scenario A</text>
  <rect x="472" y="250" width="176" height="168" rx="10" fill="#fafbfc" stroke="#c9ccd4" stroke-width="1.3"/>
  <rect x="514" y="264" width="120" height="96" rx="8" fill="#eef0f4" stroke="#ccd2da"/>
  <text x="526" y="280" class="titleDim">Path · exception</text>
  <rect x="500" y="282" width="120" height="96" rx="8" fill="#f4f5f7" stroke="#ccd2da"/>
  <text x="512" y="298" class="titleDim">Path · unhappy</text>
  <rect x="486" y="300" width="120" height="96" rx="8" fill="#fdf1e3" stroke="#d4b483" stroke-width="1.4"/>
  <text x="498" y="318" class="title">Path · happy</text>
  <text x="560" y="436" text-anchor="middle" class="head">SCENARIO</text>
  <text x="560" y="454" text-anchor="middle" class="sub">branches into path variants</text>
  <text x="560" y="467" text-anchor="middle" class="sub">(e.g., happy vs. unhappy)</text>

  <!-- Zoom: Path · happy card projects into the Path panel -->
  <path class="zoom" d="M606,300 L700,308"/>
  <path class="zoom" d="M606,396 L700,532"/>

  <!-- ===== Panel D: path is lanes × steps ===== -->
  <rect x="700" y="308" width="104" height="22" rx="6" fill="#fdf1e3" stroke="#d4b483" stroke-width="1.2"/>
  <text x="710" y="323" class="title">Path · happy</text>
  <rect x="700" y="340" width="170" height="192" rx="10" fill="#fafbfc" stroke="#c9ccd4" stroke-width="1.3"/>
  <rect x="712" y="354" width="146" height="36" fill="#e8f3ed"/>
  <rect x="712" y="390" width="146" height="36" fill="#fdf1e3"/>
  <rect x="712" y="426" width="146" height="36" fill="#fbe9f0"/>
  <rect x="712" y="462" width="146" height="36" fill="#ecebf5"/>
  <g stroke="#e2e4e9" stroke-width="1">
    <line x1="760" y1="354" x2="760" y2="498"/>
    <line x1="809" y1="354" x2="809" y2="498"/>
  </g>
  <rect x="712" y="354" width="146" height="144" fill="none" stroke="#d4d4da"/>
  <line class="boundary" x1="706" y1="390" x2="864" y2="390"/>
  <line class="boundary" x1="706" y1="426" x2="864" y2="426"/>
  <g>
    <rect x="717" y="359" width="42" height="13" rx="6.5" fill="#cfe6d9"/>
    <text x="722" y="368.5" class="pill">Customer</text>
    <rect x="717" y="395" width="45" height="13" rx="6.5" fill="#f6e0bd"/>
    <text x="722" y="404.5" class="pill">Frontstage</text>
    <rect x="717" y="431" width="43" height="13" rx="6.5" fill="#f2cfdf"/>
    <text x="722" y="440.5" class="pill">Backstage</text>
    <rect x="717" y="467" width="37" height="13" rx="6.5" fill="#d9d6ec"/>
    <text x="722" y="476.5" class="pill">Support</text>
  </g>
  <text x="785" y="550" text-anchor="middle" class="head">PATH</text>
  <text x="785" y="568" text-anchor="middle" class="sub">actors as lanes, moments as steps,</text>
  <text x="785" y="581" text-anchor="middle" class="sub">actions as cells</text>
</svg>
