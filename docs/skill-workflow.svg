<svg viewBox="0 -40 880 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    .phase { font-size: 12px; font-weight: 700; fill: #273036; }
    .rail { font-size: 9.5px; font-weight: 700; letter-spacing: .07em; fill: #8a8f98; }
    .chip { font-size: 10px; font-weight: 600; fill: #273036; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .sub { font-size: 9px; fill: #9ca3af; }
    .dim { fill: #9ca3af; }
    .flow { stroke: #8e8e93; stroke-width: 1.8; fill: none; marker-end: url(#arrW); }
    .loop { stroke: #8e8e93; stroke-width: 1.6; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrW); }
  </style>
  <defs>
    <marker id="arrW" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8e8e93"/>
    </marker>
  </defs>

  <text x="16" y="-14" font-size="15" font-weight="700" fill="#273036">Agentic blueprinting workflow</text>

  <!-- Phase headers -->
  <g>
    <rect x="108" y="18" width="168" height="30" rx="15" fill="#d9e4ea" stroke="#9aadbe" stroke-width="1.3"/>
    <text x="192" y="37" text-anchor="middle" class="phase">1 · Draft</text>
    <rect x="304" y="18" width="168" height="30" rx="15" fill="#d9e4ea" stroke="#9aadbe" stroke-width="1.3"/>
    <text x="388" y="37" text-anchor="middle" class="phase">2 · Review &amp; sign-off</text>
    <rect x="500" y="18" width="168" height="30" rx="15" fill="#d9e4ea" stroke="#9aadbe" stroke-width="1.3"/>
    <text x="584" y="37" text-anchor="middle" class="phase">3 · Import</text>
    <rect x="696" y="18" width="168" height="30" rx="15" fill="#d9e4ea" stroke="#9aadbe" stroke-width="1.3"/>
    <text x="780" y="37" text-anchor="middle" class="phase">4 · Verify &amp; deploy</text>
    <path class="flow" d="M280,33 L296,33"/>
    <path class="flow" d="M476,33 L492,33"/>
    <path class="flow" d="M672,33 L688,33"/>
  </g>

  <!-- Band backgrounds -->
  <rect x="0" y="74" width="880" height="64" fill="#fafbfc"/>
  <rect x="0" y="226" width="880" height="64" fill="#fafbfc"/>

  <!-- Rail labels -->
  <text x="10" y="100" class="rail">PLAYBOOK</text>
  <text x="10" y="114" class="sub">one at a time</text>

  <text x="10" y="176" class="rail">AGENTS</text>
  <text x="10" y="190" class="sub">fresh contexts</text>

  <text x="10" y="252" class="rail">GATE</text>
  <text x="10" y="266" class="sub">deterministic</text>

  <!-- Row 1: playbook in context -->
  <g>
    <rect x="112" y="84" width="172" height="44" rx="8" fill="#ffffff" stroke="#c9ccd4"/>
    <text x="124" y="103" class="chip mono">ingest / cocreate /</text>
    <text x="124" y="117" class="chip mono">translate-playbook</text>

    <rect x="304" y="84" width="172" height="44" rx="8" fill="#ffffff" stroke="#c9ccd4"/>
    <text x="316" y="110" class="chip mono">review-import-playbook</text>

    <rect x="496" y="84" width="172" height="44" rx="8" fill="#ffffff" stroke="#c9ccd4"/>
    <text x="508" y="110" class="chip mono">adapter-contract</text>

    <rect x="688" y="84" width="172" height="44" rx="8" fill="#ffffff" stroke="#c9ccd4"/>
    <text x="700" y="110" class="chip mono">deploy-notes</text>
  </g>

  <!-- Row 2: agents spawned -->
  <g>
    <rect x="124" y="152" width="160" height="44" rx="8" fill="#f4f5f7" stroke="#c9ccd4"/>
    <rect x="118" y="158" width="160" height="44" rx="8" fill="#fafbfc" stroke="#c9ccd4"/>
    <rect x="112" y="164" width="160" height="44" rx="8" fill="#ffffff" stroke="#b6c7d2" stroke-width="1.3"/>
    <text x="124" y="184" class="chip mono">document-reader</text>
    <text x="124" y="199" class="sub">many run in parallel</text>

    <rect x="304" y="160" width="172" height="44" rx="8" fill="#ffffff" stroke="#b6c7d2" stroke-width="1.3"/>
    <text x="316" y="186" class="chip mono">blueprint-reviewer</text>

    <rect x="496" y="160" width="172" height="44" rx="8" fill="#f4f5f7" stroke="#e2e4e9"/>
    <text x="508" y="180" class="chip dim">no agents</text>
    <text x="508" y="195" class="sub">scripts run the import</text>

    <rect x="688" y="160" width="172" height="44" rx="8" fill="#ffffff" stroke="#b6c7d2" stroke-width="1.3"/>
    <text x="700" y="186" class="chip mono">render-checker</text>
  </g>

  <!-- Row 3: gates -->
  <g>
    <rect x="112" y="236" width="172" height="44" rx="8" fill="#e8f3ed" stroke="#9dbfa9"/>
    <text x="124" y="262" class="chip">draft validates cleanly</text>

    <rect x="304" y="236" width="172" height="44" rx="8" fill="#e8f3ed" stroke="#9dbfa9"/>
    <text x="316" y="262" class="chip">sign-off hash recorded</text>

    <rect x="496" y="236" width="172" height="44" rx="8" fill="#e8f3ed" stroke="#9dbfa9"/>
    <text x="508" y="262" class="chip">read-back matches draft</text>

    <rect x="688" y="236" width="172" height="44" rx="8" fill="#e8f3ed" stroke="#9dbfa9"/>
    <text x="700" y="262" class="chip">build + views render</text>
  </g>

  <!-- Update loop -->
  <path class="loop" d="M774,280 L774,312 L198,312 L198,286"/>
  <text x="486" y="334" text-anchor="middle" class="sub" font-size="10">the update loop: edit, re-verify, redeploy</text>
</svg>
