<svg viewBox="0 -44 880 544" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    .h2 { font-size: 14px; font-weight: 700; fill: #273036; }
    .pill { font-size: 10.5px; font-weight: 700; fill: #4f4b47; }
    .step { font-size: 11px; font-weight: 600; fill: #9ca3af; }
    .anno { font-size: 9.5px; font-weight: 700; letter-spacing: .07em; fill: #8a8f98; }
    .sub { font-size: 9.5px; fill: #9ca3af; }
    .lead { stroke: #b6bac2; stroke-width: 1; fill: none; }
    .boundary { stroke: #8a8f98; stroke-width: 1.6; stroke-dasharray: 5 4; }
    .trigger { stroke: #5a6472; stroke-width: 1.5; fill: none; marker-end: url(#arrT); }
  </style>
  <defs>
    <marker id="arrT" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5a6472"/>
    </marker>
  </defs>

  <text x="16" y="-18" font-size="15" font-weight="700" fill="#273036">Inside a single path</text>

  <!-- Path sheets: variants stacked behind -->
  <rect x="130" y="22" width="580" height="424" rx="10" fill="#eceef2" stroke="#d4d4da"/>
  <rect x="120" y="32" width="580" height="424" rx="10" fill="#f4f5f7" stroke="#d4d4da"/>
  <rect x="110" y="42" width="580" height="424" rx="10" fill="#ffffff" stroke="#9aadbe" stroke-width="1.5"/>
  <text x="126" y="68" class="h2">Path · happy</text>

  <!-- Step headers -->
  <g class="step" text-anchor="middle">
    <text x="268" y="100">Step 1</text>
    <text x="384" y="100">Step 2</text>
    <text x="501" y="100">Step 3</text>
    <text x="617" y="100">Step 4</text>
  </g>

  <!-- Lane group: users -->
  <rect x="124" y="110" width="552" height="60" fill="#e8f3ed"/>
  <rect x="124" y="170" width="552" height="60" fill="#e8f3ed"/>
  <line x1="124" y1="170" x2="676" y2="170" stroke="#e2e4e9"/>
  <rect x="124" y="110" width="552" height="120" fill="none" stroke="#d4d4da"/>

  <!-- Lane group: frontstage -->
  <rect x="124" y="242" width="552" height="60" fill="#fdf1e3"/>
  <rect x="124" y="242" width="552" height="60" fill="none" stroke="#d4d4da"/>

  <!-- Lane group: backstage + support -->
  <rect x="124" y="314" width="552" height="60" fill="#fbe9f0"/>
  <rect x="124" y="374" width="552" height="60" fill="#ecebf5"/>
  <line x1="124" y1="374" x2="676" y2="374" stroke="#e2e4e9"/>
  <rect x="124" y="314" width="552" height="120" fill="none" stroke="#d4d4da"/>

  <!-- Vertical grid lines -->
  <g stroke="#e2e4e9" stroke-width="1">
    <line x1="210" y1="110" x2="210" y2="230"/>
    <line x1="326" y1="110" x2="326" y2="230"/>
    <line x1="443" y1="110" x2="443" y2="230"/>
    <line x1="559" y1="110" x2="559" y2="230"/>
    <line x1="210" y1="242" x2="210" y2="302"/>
    <line x1="326" y1="242" x2="326" y2="302"/>
    <line x1="443" y1="242" x2="443" y2="302"/>
    <line x1="559" y1="242" x2="559" y2="302"/>
    <line x1="210" y1="314" x2="210" y2="434"/>
    <line x1="326" y1="314" x2="326" y2="434"/>
    <line x1="443" y1="314" x2="443" y2="434"/>
    <line x1="559" y1="314" x2="559" y2="434"/>
  </g>

  <!-- Lane pills, on their own rail before Step 1 -->
  <g>
    <rect x="132" y="118" width="62" height="18" rx="9" fill="#cfe6d9"/>
    <text x="140" y="131" class="pill">User #1</text>
    <rect x="132" y="178" width="62" height="18" rx="9" fill="#cfe6d9"/>
    <text x="140" y="191" class="pill">User #2</text>
    <rect x="132" y="250" width="76" height="18" rx="9" fill="#f6e0bd"/>
    <text x="140" y="263" class="pill">Frontstage</text>
    <rect x="132" y="322" width="72" height="18" rx="9" fill="#f2cfdf"/>
    <text x="140" y="335" class="pill">Backstage</text>
    <rect x="132" y="382" width="62" height="18" rx="9" fill="#d9d6ec"/>
    <text x="140" y="395" class="pill">Support</text>
  </g>

  <!-- Line of interaction / visibility, in their own gaps -->
  <line class="boundary" x1="110" y1="236" x2="690" y2="236"/>
  <line class="boundary" x1="110" y1="308" x2="690" y2="308"/>

  <!-- Cells: consistent style, spread across lanes; one pair linked by a trigger -->
  <rect x="334" y="120" width="100" height="40" rx="6" fill="#ffffff" stroke="#9aadbe" stroke-width="1.4"/>
  <rect x="451" y="180" width="100" height="40" rx="6" fill="#ffffff" stroke="#9aadbe" stroke-width="1.4"/>
  <rect x="451" y="252" width="100" height="40" rx="6" fill="#ffffff" stroke="#9aadbe" stroke-width="1.4"/>
  <path class="trigger" d="M501,222 L501,246"/>
  <rect x="567" y="252" width="100" height="40" rx="6" fill="#ffffff" stroke="#9aadbe" stroke-width="1.4"/>
  <rect x="334" y="324" width="100" height="40" rx="6" fill="#ffffff" stroke="#9aadbe" stroke-width="1.4"/>
  <rect x="567" y="384" width="100" height="40" rx="6" fill="#ffffff" stroke="#9aadbe" stroke-width="1.4"/>

  <!-- ===== Left callouts ===== -->
  <text x="8" y="92" class="anno">STEP</text>
  <text x="8" y="105" class="sub">a moment in the journey</text>
  <path class="lead" d="M52,95 L248,96"/>

  <text x="8" y="152" class="anno">LANE</text>
  <text x="8" y="165" class="sub">every actor gets</text>
  <text x="8" y="177" class="sub">their own lane</text>
  <path class="lead" d="M92,155 L128,130"/>
  <path class="lead" d="M92,160 L128,186"/>

  <text x="8" y="352" class="anno">CELL</text>
  <text x="8" y="365" class="sub">what an actor does</text>
  <text x="8" y="377" class="sub">at a step</text>
  <path class="lead" d="M62,355 L330,348"/>

  <!-- ===== Right callouts ===== -->
  <text x="724" y="36" class="anno">PATHS</text>
  <text x="724" y="49" class="sub">this scenario's variants</text>
  <path class="lead" d="M720,32 L712,28"/>

  <text x="724" y="150" class="anno">TRIGGER</text>
  <text x="724" y="163" class="sub">one action sets off another</text>
  <path class="lead" d="M720,153 L508,232"/>

  <text x="724" y="218" class="anno">LINE OF INTERACTION</text>
  <text x="724" y="231" class="sub">where users meet the service</text>
  <path class="lead" d="M720,221 L694,234"/>

  <text x="724" y="322" class="anno">LINE OF VISIBILITY</text>
  <text x="724" y="335" class="sub">users can't see below this line</text>
  <path class="lead" d="M720,325 L694,310"/>
</svg>
